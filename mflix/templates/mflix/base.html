<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MFlix{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .poster-thumb { width: 60px; height: 90px; object-fit: cover; border-radius: 4px; }
    .poster-lg    { max-height: 360px; border-radius: 8px; }
    .badge-genre  { font-size: .75rem; }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'mflix:movie-list' %}">🎬 MFlix</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'mflix:movie-list' %}">Movies</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'mflix:comment-list' %}">Comments</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'mflix:theater-list' %}">Theaters</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'mflix:user-list' %}">Users</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
